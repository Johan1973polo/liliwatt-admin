<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILIWATT Admin — Connexion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1e1b4b, #7c3aed); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  h1 { font-size: 28px; color: #1e1b4b; font-weight: 800; letter-spacing: 2px; }
  p { color: #7c3aed; font-size: 12px; font-weight: 600; letter-spacing: 1px; margin-bottom: 32px; text-transform: uppercase; }
  label { display: block; font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #7c3aed; }
  button { width: 100%; margin-top: 20px; padding: 14px; background: linear-gradient(135deg, #7c3aed, #d946ef); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .error { background: #fef2f2; color: #ef4444; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .bar { height: 4px; background: linear-gradient(135deg, #7c3aed, #d946ef); border-radius: 2px; margin-bottom: 28px; }
</style>
</head>
<body>
<div class="card">
  <div class="bar"></div>
  <h1>LILIWATT</h1>
  <p>Espace Administrateur</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="••••••••" autofocus>
    <button type="submit">Connexion</button>
  </form>
</div>
</body>
</html>
